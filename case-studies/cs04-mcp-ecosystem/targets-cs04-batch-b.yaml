meta:
  case_study: CS04-B
  description: OWASP MCP Ecosystem Audit — CS04 Batch B (new no-auth servers 2026-07-03)
  corvus_version: 1.0.1
  strategy: |
    Targets seleccionados por confirmación explícita de no-auth.
    Categorías:
    - Linters/análisis local (ESLint, MemLab)
    - Doc servers (SAP CAP, Apple docs, Grafana design, Taiga UI, Vuetify)
    - File processors (Excel, PDF)
    - Public APIs sin key (@cyanheads/* → arXiv, PubChem, HN, SEC, EU Law, BLS, CDC...)
    - Weather (Open-Meteo — múltiple versiones npm+PyPI)
    - PyPI (arxiv, weather, multi-search)

targets:

# ─── LINTERS / LOCAL ANALYSIS ─────────────────────────────────────────────

# 25,173/wk — Official ESLint MCP, local analysis, no auth, confirmed
- name: eslint-mcp
  tier: CS04-B
  transport: stdio
  cmd:
  - npx
  - -y
  - '@eslint/mcp@latest'

# MemLab JS heap snapshot analysis — local, no auth, Meta OSS
- name: memlab-mcp-server
  tier: CS04-B
  transport: stdio
  cmd:
  - npx
  - -y
  - '@memlab/mcp-server'

