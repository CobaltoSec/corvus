- name: ui5-mcp-server
  tier: CS04-I
  transport: stdio
  cmd:
  - npx
  - -y
  - '@ui5/mcp-server'

# Synergy Design System — web component library de Bayern Design
# componentes basados en Shoelace/lit, sin API key
- name: synergy-mcp-server
  tier: CS04-I
  transport: stdio
  cmd:
  - npx
  - -y
  - '@synergy-design-system/mcp'
