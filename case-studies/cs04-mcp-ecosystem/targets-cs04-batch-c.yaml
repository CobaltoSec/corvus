meta:
  case_study: CS04-C
  description: OWASP MCP Ecosystem Audit — CS04 Batch C (more public APIs + PyPI 2026-07-03)
  corvus_version: 1.0.1
  strategy: |
    Continuación del esfuerzo de expansión hacia 100 servers.
    Batería adicional de @cyanheads/* servers (public APIs sin auth)
    + servidores PyPI (Wikipedia, clinical, multi-search variants)
    + otros descubiertos post Batch B.

