  transport: stdio
  cmd:
  - npx
  - -y
  - '@ohah/react-native-mcp-server'

# 1.9k/wk — VibeFrame AI-native video editing
- name: vibeframe-mcp-server
  tier: CS04-D
  transport: stdio
  cmd:
  - npx
  - -y
