meta:
  case_study: CS04-D
  description: OWASP MCP Ecosystem Audit — CS04 Batch D (research-confirmed no-auth + candidates.yaml subset 2026-07-03)
  corvus_version: 1.0.1
  strategy: |
    Basado en research manual npm/PyPI. Excluye @cyanheads/* (todos fallaron en CS04-B).
    Categorías:
    - Datos financieros públicos (Yahoo Finance, sin auth)
    - Framework docs públicos (Mastra AI, sin auth)
    - Weather/clima (NOAA + Open-Meteo npm, sin auth)
    - Enciclopedias (Wikipedia npm + PyPI, sin auth)
    - Herramientas científicas (ToolUniverse Harvard, PubMed, Academic, sin auth)
    - DB local (DuckDB, sin auth)
    - Design systems / docs
    - PyPI variantes académicas
    - Candidatos de candidates.yaml no intentados aún

targets:

# ─── FINANZAS PÚBLICAS ────────────────────────────────────────────────────────

# Yahoo Finance público, sin auth — datos en tiempo real de stocks
- name: yahoo-finance-mcp
  tier: CS04-D
  transport: stdio
  cmd:
  - npx
  - -y
  - yahoo-finance-mcp-server

# ─── FRAMEWORK DOCS (PUBLIC URL) ─────────────────────────────────────────────

# 22.6k/wk PulseMCP — Mastra AI TypeScript framework docs, sin auth
- name: mastra-mcp-docs-server
  tier: CS04-D
  transport: stdio
  cmd:
  - npx
  - -y
  - '@mastra/mcp-docs-server@latest'

# ─── WEATHER / CLIMA ─────────────────────────────────────────────────────────

# Sin auth — NOAA + Open-Meteo combinado, zero credentials
- name: dangahagan-weather-mcp
  tier: CS04-D
  transport: stdio
  cmd:
  - npx
  - -y
  - '@dangahagan/weather-mcp@latest'

# ─── ENCICLOPEDIA ────────────────────────────────────────────────────────────

# Wikipedia REST API pública, sin auth — versión npm
- name: wikipedia-mcp-npm
  tier: CS04-D
  transport: stdio
  cmd:
  - npx
  - -y
  - wikipedia-mcp

# Wikipedia PyPI — Python implementation, sin auth
- name: wikipedia-mcp-server-pypi
  tier: CS04-D
  transport: stdio
  cmd:
  - uvx
  - wikipedia-mcp-server

# ─── SCIENTIFIC / RESEARCH (PyPI) ────────────────────────────────────────────

# Harvard/MIT — 72.9k PulseMCP — 1000+ life science tools, sin auth
- name: tooluniverse-mcp
  tier: CS04-D
  transport: stdio
  cmd:
  - uvx
  - --refresh
  - tooluniverse

# PubMed NCBI biomedical search, public API (email opcional), sin auth
- name: pubmed-search-mcp
  tier: CS04-D
  transport: stdio
  cmd:
  - uvx
  - pubmed-search-mcp

# Multi-source academic: Semantic Scholar + arXiv + CrossRef, sin auth
- name: academic-mcp-pypi
  tier: CS04-D
  transport: stdio
  cmd:
  - uvx
  - academic-mcp

# Lunar calendar computation (sin auth, local calculation)
- name: lunar-mcp-server
  tier: CS04-D
  transport: stdio
  cmd:
  - uvx
  - lunar-mcp-server

# ─── DATABASE LOCAL ──────────────────────────────────────────────────────────

# DuckDB SQL sobre archivos locales, sin auth
- name: mcp-server-duckdb
  tier: CS04-D
  transport: stdio
  cmd:
  - uvx
  - mcp-server-duckdb
  - --db-path
  - ':memory:'

# ─── DESIGN SYSTEMS / DOCS ───────────────────────────────────────────────────

# 6k/wk — Hero design system (Elysia / Booking.com), sin auth, docs públicos
- name: hero-fe-mcp-server
  tier: CS04-D
  transport: stdio
  cmd:
  - npx
  - -y
  - '@ehrocks/fe-mcp-server'

# 1.5k/wk — PyRosetta protein structure modeling docs, sin auth
- name: rosetta-mcp-server
  tier: CS04-D
  transport: stdio
  cmd:
  - npx
  - -y
  - rosetta-mcp-server

# 2.5k/wk — PaPut memo output, sin auth
- name: paput-mcp
  tier: CS04-D
  transport: stdio
  cmd:
  - npx
  - -y
  - paput-mcp

# 8k/wk — Docusaurus plugin MCP server endpoint
- name: docusaurus-mcp-plugin
  tier: CS04-D
  transport: stdio
  cmd:
  - npx
  - -y
  - docusaurus-plugin-mcp-server

# ─── GIT / DEVTOOLS ──────────────────────────────────────────────────────────

# @cyanheads Git MCP (4.6k/wk) — diferente de Python mcp-server-git (CS01)
# Cyanheads familia falló en CS04-B; git puede ser excepción (no necesita API)
- name: cyanheads-git-mcp
  tier: CS04-D
  transport: stdio
  cmd:
  - npx
  - -y
  - '@cyanheads/git-mcp-server@latest'

# ─── INCIERTOS (posible no-auth, vale probar) ────────────────────────────────

# 10k/wk — Z.AI MCP capabilities, incierto si necesita auth
- name: zai-mcp-server
  tier: CS04-D
  transport: stdio
  cmd:
  - npx
  - -y
  - '@z_ai/mcp-server'

# 5k/wk — Storybook AI assistant, puede necesitar Storybook corriendo
